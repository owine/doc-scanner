# Pre-commit hooks. Install with:
#   brew install pre-commit
#   pre-commit install   # one-time, sets up .git/hooks/pre-commit
repos:
  - repo: https://github.com/gitguardian/ggshield
    rev: v1.50.2
    hooks:
      - id: ggshield
        # No overrides needed — upstream .pre-commit-hooks.yaml correctly sets:
        #   stages: [pre-commit]
        #   pass_filenames: false  (ggshield gets filenames from commit IDs)
