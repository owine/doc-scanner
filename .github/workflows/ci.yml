name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (server)
        run: npm --workspace @doc-scanner/server run typecheck

      - name: Test (server)
        run: npm --workspace @doc-scanner/server test

      - name: Test (pwa)
        run: npm --workspace @doc-scanner/pwa test

      - name: Build (server)
        run: npm --workspace @doc-scanner/server run build

      - name: Build (pwa)
        run: npm --workspace @doc-scanner/pwa run build

  docker-build:
    name: docker build (${{ matrix.platform }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # need tags + history for `git describe`

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Compute image metadata
        id: meta
        run: |
          {
            echo "git_sha=${GITHUB_SHA}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "version=$(git describe --tags --always --dirty)"
          } >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.platform }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=docker-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.platform }}
          tags: doc-scanner:ci
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.meta.outputs.version }}
